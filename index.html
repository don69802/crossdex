:none;font-size:13px;max-width:400px}.toast.on{display:block}.toast.ok{border-color:#10b981}.toast.err{border-color:#ef4444}.ftr{text-align:center;padding:30px;color:#555;font-size:12px;border-top:1px solid #1a1a2e;margin-top:40px}.api-status{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}.api-badge{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700}.api-ok{background:rgba(16,185,129,0.2);color:#10b981}.api-err{background:rgba(239,68,68,0.2);color:#ef4444}.news-item{padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:8px}.news-item a{color:#00d4ff;text-decoration:none}.news-item small{color:#666;display:block;margin-top:4px}.fear-bar{height:20px;border-radius:10px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981);position:relative;margin:10px 0}.fear-needle{position:absolute;top:-4px;width:4px;height:28px;background:white;border-radius:2px}.gas-bar{height:8px;border-radius:4px;background:#252550;margin:8px 0}.gas-fill{height:100%;border-radius:4px;transition:width 0.5s}@media(max-width:768px){.ban .stats{display:none}.swap-wrap{flex-direction:column;align-items:center}.g2{grid-template-columns:1fr}.gg{grid-template-columns:1fr}.hdr nav{gap:6px}}

<script>

var DEXES=[{name:"Uniswap",color:"#ff007a",fee:0.3,icon:"U",vol:2500000000,router:"0xE592427A0AEce92De3Edee1F18E0157C05861564"},{name:"SushiSwap",color:"#fa52a1",fee:0.3,icon:"S",vol:800000000,router:"0xd9e1cE17f2641f24aE83637ab66a2cca9C378B9F"},{name:"1inch",color:"#1c8cdc",fee:0,icon:"1",vol:1200000000,router:"0x1111111254eeb25477b68fb85ed929f73a960582"},{name:"Curve",color:"#0066ff",fee:0.04,icon:"C",vol:500000000,router:"0x99a58482BD75cbab83b27ec03CA68fF489b5788f"},{name:"Balancer",color:"#555",fee:0.2,icon:"B",vol:300000000,router:"0x"},{name:"ParaSwap",color:"#5929e6",fee:0,icon:"P",vol:400000000,router:"0x"},{name:"0x",color:"#333",fee:0,icon:"0",vol:600000000,router:"0x"},{name:"PancakeSwap",color:"#d1884f",fee:0.25,icon:"PS",vol:1800000000,router:"0x"}];
var pages=["swap","limit","routes","gas","portfolio","history","alerts","charts","dex","tokens","news","fear","settings"];
var icons={swap:"S",limit:"L",routes:"R",gas:"G",portfolio:"P",history:"H",alerts:"A",charts:"C",dex:"D",tokens:"T",news:"N",fear:"F",settings:"X"};
var labels={swap:"Swap",limit:"Limit",routes:"Routes",gas:"Gas",portfolio:"Portfolio",history:"History",alerts:"Alerts",charts:"Charts",dex:"DEXes",tokens:"Tokens",news:"News",fear:"Fear",settings:"Settings"};
var sI=T[0],sO=T[3],co=false,pg="swap",md2="in";
var hist=[],alerts=[],limOrds=[];
var apiStatus={coingecko:"loading",etherscan:"loading",cryptocompare:"loading",feargreed:"loading"};
var fearData={value:50,classification:"Neutral"},newsData=[];
var gasData={slow:15,standard:25,fast:45};
var provider=null,signer=null,walletAddr="";
var navH="";pages.forEach(function(p,i){navH+='<a'+(i===0?' class="on"':'')+' onclick="go(\''+p+'\',this)">'+icons[p]+' '+labels[p]+'</a>';});
document.getElementById("nav").innerHTML=navH;
function fetchPrices(){var ids=T.map(function(t){return t.cg}).join(",");fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids+"&vs_currencies=usd&include_market_cap=true&include_24hr_vol=true&include_24hr_change=true").then(function(r){return r.json()}).then(function(d){var tv=0,tm=0;T.forEach(function(t){if(d[t.cg]){t.p=d[t.cg].usd||t.p;t.change24=d[t.cg].usd_24h_change||0;tv+=d[t.cg].usd_24h_vol||0;tm+=d[t.cg].usd_market_cap||0}});apiStatus.coingecko="ok";document.getElementById("volStat").textContent="$"+fmtBig(tv);document.getElementById("mcapStat").textContent="$"+fmtBig(tm);buildTicker()}).catch(function(){apiStatus.coingecko="error";buildTicker()})}
function fetchGas(){fetch("https://api.etherscan.io/api?module=gastracker&action=gasoracle").then(function(r){return r.json()}).then(function(d){if(d.result){gasData.slow=parseInt(d.result.SafeGasPrice)||15;gasData.standard=parseInt(d.result.ProposeGasPrice)||25;gasData.fast=parseInt(d.result.FastGasPrice)||45;apiStatus.etherscan="ok";if(pg==="gas")rn()}}).catch(function(){apiStatus.etherscan="error"})}
function fetchNews(){fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN&limit=10").then(function(r){return r.json()}).then(function(d){if(d.Data){newsData=d.Data.slice(0,10).map(function(n){return{title:n.title,url:n.url,source:n.source,published:new Date(n.published_on*1e3).toLocaleDateString()}});apiStatus.cryptocompare="ok";if(pg==="news")rn()}}).catch(function(){apiStatus.cryptocompare="error"})}
function fetchFearGreed(){fetch("https://api.alternative.me/fng/?limit=1").then(function(r){return r.json()}).then(function(d){if(d.data&&d.data[0]){fearData={value:parseInt(d.data[0].value),classification:d.data[0].value_classification};apiStatus.feargreed="ok";if(pg==="fear")rn()}}).catch(function(){apiStatus.feargreed="error"})}
function fetchAll(){fetchPrices();fetchGas();fetchNews();fetchFearGreed()}
function buildTicker(){var el=document.getElementById("tk");if(!el)return;var h="";for(var i=0;i<2;i++)T.forEach(function(t){var ch=t.change24||0;h+='<div class="ti"><b>'+t.i+' '+t.s+'</b> $'+t.p.toLocaleString(undefined,{minimumFractionDigits:t.p<1?6:2,maximumFractionDigits:t.p<1?6:2})+' <span class="'+(ch>=0?"g":"r")+'">'+(ch>=0?"+":"")+ch.toFixed(2)+'%</span></div>'});el.innerHTML=h}
function fmtBig(n){if(n>=1e12)return(n/1e12).toFixed(2)+"T";if(n>=1e9)return(n/1e9).toFixed(2)+"B";if(n>=1e6)return(n/1e6).toFixed(2)+"M";return n.toFixed(2)}
function fmtBal(t){return t.bal.toLocaleString(undefined,{maximumFractionDigits:4})+" "+t.s}
function fmtAmt(n){return n>1e6?(n/1e6).toFixed(2)+"M":n>1e3?(n/1e3).toFixed(2)+"K":n>0.001?n.toFixed(4):n.toFixed(8)}
function go(p,b){pg=p;document.querySelectorAll(".hdr nav a").forEach(function(x){x.classList.remove("on")});if(b)b.classList.add("on");rn()}
function genRoutes(){var r=[],base=sI.p/sO.p;DEXES.forEach(function(d){r.push({dex:d,output:base*(1+(Math.random()*0.04-0.02)),gas:Math.random()*8+1})});r.sort(function(a,b){return b.output-a.output});return r}
function renderRoutes(routes){var h="";routes.forEach(function(r,i){var b=i===0;h+='<div class="route-item'+(b?" best":"")+'"><div class="dex-icon" style="background:'+r.dex.color+';color:white">'+r.dex.icon+'</div><div class="dex-info"><div class="dex-name">'+r.dex.name+(b?' <span class="best-badge">BEST</span>':'')+'</div><div class="dex-pair">'+sI.s+' > '+sO.s+' | Fee: '+r.dex.fee+'%</div></div><div class="dex-out"><div class="dex-amt">'+fmtAmt(r.output)+'</div><div class="dex-fee">Gas: $'+r.gas.toFixed(2)+'</div></div></div>'});return h}
function cl(){var e=document.getElementById("ai"),o=document.getElementById("ao"),q=document.getElementById("qi");if(!e||!o)return;var v=parseFloat(e.value);if(!v||v<=0){o.value="";if(q)q.classList.remove("on");return}var routes=genRoutes(),best=routes[0],res=v*best.output;o.value=res>1e6?Math.floor(res).toLocaleString():res>1?res.toFixed(2):res.toFixed(6);if(q){document.getElementById("qr").textContent=best.dex.name;var avg=0;routes.forEach(function(r){avg+=r.output});avg/=routes.length;document.getElementById("qp").textContent="+"+((best.output-avg)/avg*100).toFixed(1)+"%";document.getElementById("qf").textContent="~$"+best.gas.toFixed(2);q.classList.add("on")}}
function sw(){var t=sI;sI=sO;sO=t;rn()}

async function conn(){if(co){co=false;provider=null;signer=null;walletAddr="";document.getElementById("cb").textContent="Connect Wallet";document.getElementById("cb").classList.remove("ok");T.forEach(function(t){t.bal=0});rn();return}if(window.ethereum){try{await window.ethereum.request({method:"eth_requestAccounts"});provider=window.ethereum;co=true;var accounts=await provider.request({method:"eth_accounts"});walletAddr=accounts[0];var s=walletAddr.slice(0,6)+"..."+walletAddr.slice(-4);document.getElementById("cb").textContent=s;document.getElementById("cb").classList.add("ok");await loadBalances();rn();toast("Connected: "+s,"ok")}catch(e){toast("Rejected","err")}}else{toast("Install MetaMask!","err")}}
async function loadBalances(){if(!provider)return;for(var i=0;i<T.length;i++){var t=T[i];try{var bal=await provider.request({method:"eth_call",params:[{to:t.addr,data:"0x70a08231000000000000000000000000"+walletAddr.slice(2)},"latest"]});var bn=parseInt(bal,16);t.s==="ETH"?t.bal=bn/1e18:t.bal=bn/Math.pow(10,t.dec)}catch(e){t.bal=0}}}
function om(m){md2=m;document.getElementById("md").classList.add("on");fillTokenList()}

function ft(){var q=document.querySelector(".ms").value.toLowerCase(),l=document.getElementById("tl");l.innerHTML="";T.forEach(function(t){if(t.s.toLowerCase().indexOf(q)>=0||t.n.toLowerCase().indexOf(q)>=0){var d=document.createElement("div");d.className="ti2";d.innerHTML='<span style="font-size:20px">'+t.i+'</span><b>'+t.s+'</b><small style="color:#666">'+t.n+'</small>';d.onclick=function(){if(md2==="in")sI=t;else if(md2==="out")sO=t;else sI=t;cm();rn()};l.appendChild(d)}})}
function placeLim(){if(!co){toast("Connect wallet first!","err");return}var amt=document.getElementById("limAmt").value,price=document.getElementById("limPrice").value;if(!amt||!price){toast("Fill all fields!","err");return}limOrds.push({from:sI.s,to:sO.s,amount:amt,price:price,time:new Date().toLocaleTimeString()});toast("Order placed!","ok");rn()}
function renderLimOrds(){if(!limOrds.length)return'<p style="color:#888;font-size:13px">No orders</p>';var h="";limOrds.forEach(function(o,i){h+='<div class="hi"><div style="flex:1"><b>'+o.amount+' '+o.from+' > '+o.to+'</b><br><small style="color:#666">@ $'+o.price+' | '+o.time+'</small></div><button style="background:none;border:none;color:#ef4444;cursor:pointer" onclick="limOrds.splice('+i+',1);rn()">X</button></div>'});return h}
function addAlert(){if(!co){toast("Connect wallet first!","err");return}var tok=document.getElementById("alertTok").value,price=document.getElementById("alertPrice").value,cond=document.getElementById("alertCond").value;if(!price){toast("Enter price!","err");return}alerts.push({token:tok,price:price,condition:cond,time:new Date().toLocaleTimeString()});toast("Alert added!","ok");rn()}
function renderAlerts(){if(!alerts.length)return'<p style="color:#888;font-size:13px">No alerts</p>';var h="";alerts.forEach(function(a,i){h+='<div class="hi"><div style="flex:1"><b>'+a.token+'</b><br><small style="color:#666">'+a.condition+' $'+a.price+' | '+a.time+'</small></div><button style="background:none;border:none;color:#ef4444;cursor:pointer" onclick="alerts.splice('+i+',1);rn()">X</button></div>'});return h}
function setChart(btn){document.querySelectorAll(".cbs button").forEach(function(b){b.classList.remove("on")});btn.classList.add("on");drawChart()}
