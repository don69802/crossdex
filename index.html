<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossDEX Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:white;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 30px;border-bottom:1px solid #1a1a2e;background:#0d0d1f;position:sticky;top:0;z-index:40}
.hdr .logo{font-size:20px;font-weight:800;color:#00d4ff}
.hdr nav{display:flex;gap:12px;flex-wrap:wrap}
.hdr nav a{color:#888;font-size:12px;cursor:pointer;padding:6px 8px;border-radius:6px}
.hdr nav a:hover,.hdr nav a.on{color:#00d4ff;background:rgba(0,212,255,0.1)}
.cbtn{background:linear-gradient(135deg,#00d4ff,#7b2ff7);border:none;padding:10px 20px;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:13px}
.cbtn.ok{background:linear-gradient(135deg,#10b981,#059669)}
.ban{background:linear-gradient(135deg,#0a1628,#0d0d2e);padding:24px 40px;border-bottom:1px solid rgba(0,212,255,0.15);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.ban h1{font-size:26px;font-weight:800;margin-bottom:6px}
.ban h1 span{color:#00d4ff}
.ban p{color:#888;font-size:13px;margin-bottom:14px}
.ban .stats{display:flex;gap:30px}
.ban .st b{display:block;font-size:20px;color:#00d4ff}
.ban .st small{color:#666;font-size:11px}
.tick{background:rgba(0,212,255,0.04);padding:8px 0;overflow:hidden}
.tick .inner{display:flex;gap:30px;animation:sc 25s linear infinite;white-space:nowrap}
.tick .ti{font-size:12px;display:flex;align-items:center;gap:6px}
.g{color:#10b981}.r{color:#ef4444}
@keyframes sc{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:#111128;border:1px solid #1a1a3e;border-radius:16px;padding:24px}
.card h2{margin-bottom:16px;font-size:18px}
.swap-wrap{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
.fld{background:#1a1a3e;border-radius:12px;padding:14px;margin-bottom:6px}
.fld label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:8px}
.frow{display:flex;justify-content:space-between;align-items:center}
.frow input{background:none;border:none;color:white;font-size:24px;font-weight:700;width:55%;outline:none}
.frow input::-webkit-outer-spin-button,.frow input::-webkit-inner-spin-button{-webkit-appearance:none}
.tsel{background:#252550;border:none;padding:8px 14px;border-radius:20px;color:white;cursor:pointer;font-weight:700;font-size:13px}
.arr{text-align:center;margin:-4px 0;z-index:2;position:relative}
.arr button{background:#111128;border:3px solid #111128;color:#00d4ff;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px}
.sbtn{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);border:none;border-radius:12px;color:white;font-weight:700;cursor:pointer;margin-top:14px;font-size:15px}
.sbtn.off{background:#252550;color:#555;cursor:default}
.route-item{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:8px;border:2px solid transparent;cursor:pointer}
.route-item:hover,.route-item.best{border-color:#00d4ff}
.dex-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.dex-info{flex:1}.dex-name{font-weight:700;font-size:14px}.dex-pair{font-size:11px;color:#888}
.dex-out{text-align:right}.dex-amt{font-weight:700;font-size:14px;color:#10b981}.dex-fee{font-size:11px;color:#888}
.best-badge{background:#00d4ff;color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.qi{display:none;background:#1a1a3e;border-radius:10px;padding:12px;margin-top:12px;font-size:12px}
.qi.on{display:block}
.qr{display:flex;justify-content:space-between;margin-bottom:4px}
.ql{color:#888}.qv{font-weight:600}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:50;justify-content:center;align-items:center}
.modal.on{display:flex}
.mbox{background:#111128;width:380px;border-radius:16px;padding:20px;border:1px solid #1a1a3e;max-height:70vh;overflow-y:auto}
.mhd{display:flex;justify-content:space-between;margin-bottom:15px}
.mhd button{background:none;border:none;color:white;font-size:18px;cursor:pointer}
.ms{width:100%;padding:10px;background:#1a1a3e;border:1px solid #252550;border-radius:8px;color:white;margin-bottom:10px;font-size:13px;outline:none}
.ti2{padding:10px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:10px}
.ti2:hover{background:#1a1a3e}
.lc{background:#1a1a3e;border-radius:12px;padding:16px;margin-bottom:10px}
.lc label{display:block;font-size:12px;color:#888;margin-bottom:6px}
.lc input,.lc select{width:100%;padding:10px;background:#252550;border:1px solid #333;border-radius:8px;color:white;font-size:13px;outline:none}
.pi{display:flex;align-items:center;gap:12px;padding:14px;background:#1a1a3e;border-radius:10px;margin-bottom:8px}
.hi{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:10px}
.ht{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700}
.hb{background:rgba(16,185,129,0.2);color:#10b981}
.hs{background:rgba(239,68,68,0.2);color:#ef4444}
.gg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gi{background:#1a1a3e;border-radius:10px;padding:16px;text-align:center}
.gs{font-size:12px;color:#888}.gp{font-size:20px;font-weight:800}.gc{font-size:11px;color:#888;margin-top:4px}
.cb{background:#1a1a3e;border-radius:12px;padding:16px;height:250px}
.cc{width:100%;height:100%}
.cbs{display:flex;gap:6px;margin-bottom:12px}
.cbs button{padding:6px 14px;background:#252550;border:none;border-radius:6px;color:#888;font-size:12px;cursor:pointer}
.cbs button.on{background:#00d4ff;color:#000}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.toast{position:fixed;bottom:20px;right:20px;background:#111128;border:1px solid #1a1a3e;border-radius:10px;padding:14px 20px;z-index:100;display:none;font-size:13px;max-width:400px}
.toast.on{display:block}.toast.ok{border-color:#10b981}.toast.err{border-color:#ef4444}
.ftr{text-align:center;padding:30px;color:#555;font-size:12px;border-top:1px solid #1a1a2e;margin-top:40px}
.api-status{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.api-badge{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700}
.api-ok{background:rgba(16,185,129,0.2);color:#10b981}
.api-err{background:rgba(239,68,68,0.2);color:#ef4444}
.news-item{padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:8px}
.news-item a{color:#00d4ff;text-decoration:none}
.news-item small{color:#666;display:block;margin-top:4px}
.fear-bar{height:20px;border-radius:10px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981);position:relative;margin:10px 0}
.fear-needle{position:absolute;top:-4px;width:4px;height:28px;background:white;border-radius:2px}
.gas-bar{height:8px;border-radius:4px;background:#252550;margin:8px 0}
.gas-fill{height:100%;border-radius:4px;transition:width 0.5s}
@media(max-width:768px){.ban .stats{display:none}.swap-wrap{flex-direction:column;align-items:center}.g2{grid-template-columns:1fr}.gg{grid-template-columns:1fr}.hdr nav{gap:6px}}
</style>
</head>

<div class="logo">CrossDEX</div>

</div>
