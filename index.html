<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossDEX Pro - Full API Integration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0a1a;color:white;min-height:100vh}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 30px;border-bottom:1px solid #1a1a2e;background:#0d0d1f;position:sticky;top:0;z-index:40}
.hdr .logo{font-size:20px;font-weight:800;color:#00d4ff}
.hdr nav{display:flex;gap:12px;flex-wrap:wrap}
.hdr nav a{color:#888;font-size:12px;cursor:pointer;padding:6px 8px;border-radius:6px}
.hdr nav a:hover,.hdr nav a.on{color:#00d4ff;background:rgba(0,212,255,0.1)}
.cbtn{background:linear-gradient(135deg,#00d4ff,#7b2ff7);border:none;padding:10px 20px;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:13px}
.cbtn.ok{background:linear-gradient(135deg,#10b981,#059669)}
.ban{background:linear-gradient(135deg,#0a1628,#0d0d2e);padding:24px 40px;border-bottom:1px solid rgba(0,212,255,0.15);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.ban h1{font-size:26px;font-weight:800;margin-bottom:6px}
.ban h1 span{color:#00d4ff}
.ban p{color:#888;font-size:13px;margin-bottom:14px}
.ban .stats{display:flex;gap:30px}
.ban .st b{display:block;font-size:20px;color:#00d4ff}
.ban .st small{color:#666;font-size:11px}
.tick{background:rgba(0,212,255,0.04);padding:8px 0;overflow:hidden}
.tick .inner{display:flex;gap:30px;animation:sc 25s linear infinite;white-space:nowrap}
.tick .ti{font-size:12px;display:flex;align-items:center;gap:6px}
.g{color:#10b981}.r{color:#ef4444}
@keyframes sc{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.main{max-width:1200px;margin:0 auto;padding:24px 20px}
.card{background:#111128;border:1px solid #1a1a3e;border-radius:16px;padding:24px}
.card h2{margin-bottom:16px;font-size:18px}
.swap-wrap{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;align-items:flex-start}
.fld{background:#1a1a3e;border-radius:12px;padding:14px;margin-bottom:6px}
.fld label{display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:8px}
.frow{display:flex;justify-content:space-between;align-items:center}
.frow input{background:none;border:none;color:white;font-size:24px;font-weight:700;width:55%;outline:none}
.frow input::-webkit-outer-spin-button,.frow input::-webkit-inner-spin-button{-webkit-appearance:none}
.tsel{background:#252550;border:none;padding:8px 14px;border-radius:20px;color:white;cursor:pointer;font-weight:700;font-size:13px}
.arr{text-align:center;margin:-4px 0;z-index:2;position:relative}
.arr button{background:#111128;border:3px solid #111128;color:#00d4ff;width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px}
.sbtn{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);border:none;border-radius:12px;color:white;font-weight:700;cursor:pointer;margin-top:14px;font-size:15px}
.sbtn.off{background:#252550;color:#555;cursor:default}
.route-item{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:8px;border:2px solid transparent;cursor:pointer}
.route-item:hover,.route-item.best{border-color:#00d4ff}
.dex-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.dex-info{flex:1}.dex-name{font-weight:700;font-size:14px}.dex-pair{font-size:11px;color:#888}
.dex-out{text-align:right}.dex-amt{font-weight:700;font-size:14px;color:#10b981}.dex-fee{font-size:11px;color:#888}
.best-badge{background:#00d4ff;color:#000;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.qi{display:none;background:#1a1a3e;border-radius:10px;padding:12px;margin-top:12px;font-size:12px}
.qi.on{display:block}
.qr{display:flex;justify-content:space-between;margin-bottom:4px}
.ql{color:#888}.qv{font-weight:600}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:50;justify-content:center;align-items:center}
.modal.on{display:flex}
.mbox{background:#111128;width:380px;border-radius:16px;padding:20px;border:1px solid #1a1a3e;max-height:70vh;overflow-y:auto}
.mhd{display:flex;justify-content:space-between;margin-bottom:15px}
.mhd button{background:none;border:none;color:white;font-size:18px;cursor:pointer}
.ms{width:100%;padding:10px;background:#1a1a3e;border:1px solid #252550;border-radius:8px;color:white;margin-bottom:10px;font-size:13px;outline:none}
.ti2{padding:10px;cursor:pointer;border-radius:8px;display:flex;align-items:center;gap:10px}
.ti2:hover{background:#1a1a3e}
.lc{background:#1a1a3e;border-radius:12px;padding:16px;margin-bottom:10px}
.lc label{display:block;font-size:12px;color:#888;margin-bottom:6px}
.lc input,.lc select{width:100%;padding:10px;background:#252550;border:1px solid #333;border-radius:8px;color:white;font-size:13px;outline:none}
.pi{display:flex;align-items:center;gap:12px;padding:14px;background:#1a1a3e;border-radius:10px;margin-bottom:8px}
.hi{display:flex;align-items:center;gap:12px;padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:8px}
.ht{padding:4px 8px;border-radius:4px;font-size:10px;font-weight:700}
.hb{background:rgba(16,185,129,0.2);color:#10b981}
.hs{background:rgba(239,68,68,0.2);color:#ef4444}
.gg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gi{background:#1a1a3e;border-radius:10px;padding:16px;text-align:center}
.gs{font-size:12px;color:#888}.gp{font-size:20px;font-weight:800}.gc{font-size:11px;color:#888;margin-top:4px}
.cb{background:#1a1a3e;border-radius:12px;padding:16px;height:250px}
.cc{width:100%;height:100%}
.cbs{display:flex;gap:6px;margin-bottom:12px}
.cbs button{padding:6px 14px;background:#252550;border:none;border-radius:6px;color:#888;font-size:12px;cursor:pointer}
.cbs button.on{background:#00d4ff;color:#000}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.toast{position:fixed;bottom:20px;right:20px;background:#111128;border:1px solid #1a1a3e;border-radius:10px;padding:14px 20px;z-index:100;display:none;font-size:13px;max-width:400px}
.toast.on{display:block}
.ftr{text-align:center;padding:30px;color:#555;font-size:12px;border-top:1px solid #1a1a2e;margin-top:40px}
.api-status{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.api-badge{padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700}
.api-ok{background:rgba(16,185,129,0.2);color:#10b981}
.api-err{background:rgba(239,68,68,0.2);color:#ef4444}
.api-loading{background:rgba(245,158,11,0.2);color:#f59e0b}
.news-item{padding:12px;background:#1a1a3e;border-radius:10px;margin-bottom:8px}
.news-item a{color:#00d4ff;text-decoration:none}
.news-item small{color:#666;display:block;margin-top:4px}
.fear-bar{height:20px;border-radius:10px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981);position:relative;margin:10px 0}
.fear-needle{position:absolute;top:-4px;width:4px;height:28px;background:white;border-radius:2px}
.gas-bar{height:8px;border-radius:4px;background:#252550;margin:8px 0}
.gas-fill{height:100%;border-radius:4px;transition:width 0.5s}
@media(max-width:768px){.ban .stats{display:none}.swap-wrap{flex-direction:column;align-items:center}.g2{grid-template-columns:1fr}.gg{grid-template-columns:1fr}.hdr nav{gap:6px}}
</style>
</head>
<body>
<div class="hdr">
<div class="logo">⚡ CrossDEX</div>
<nav id="nav"></nav>
<button class="cbtn" id="cb" onclick="conn()">Connect Wallet</button>
</div>
<div class="ban">
<div>
<h1>Find the <span>Best Rate</span> Across All DEXes</h1>
<p>We scan 50+ DEXes with real-time APIs. Prices, gas, news & more.</p>
<button class="cbtn" onclick="conn()">🔗 Connect Wallet</button>
</div>
<div class="stats">
<div class="st"><b id="volStat">Loading...</b><small>Volume</small></div>
<div class="st"><b>50+</b><small>DEXes</small></div>
<div class="st"><b id="mcapStat">Loading...</b><small>Market Cap</small></div>
</div>
</div>
<div class="tick"><div class="inner" id="tk"></div></div>
<div class="main" id="area"></div>
<div class="modal" id="md"><div class="mbox"><div class="mhd"><b>Select Token</b><button onclick="cm()">✕</button></div><input class="ms" placeholder="Search..." oninput="ft()"><div id="tl"></div></div></div>
<div class="toast" id="toast"></div>
<div class="ftr"><p>CrossDEX Pro © 2024 | APIs: CoinGecko, Etherscan, CryptoCompare, Fear&Greed</p></div>

<script>
var T=[
{s:"ETH",n:"Ethereum",i:"⟠",p:3500,bal:1.234,cg:"ethereum",mc:420000000000},
{s:"WBTC",n:"Wrapped BTC",i:"₿",p:65000,bal:0.05,cg:"wrapped-bitcoin",mc:12000000000},
{s:"USDC",n:"USD Coin",i:"💵",p:1,bal:5000,cg:"usd-coin",mc:30000000000},
{s:"USDT",n:"Tether",i:"💲",p:1,bal:3200,cg:"tether",mc:90000000000},
{s:"DAI",n:"Dai",i:"🔶",p:1,bal:1500,cg:"dai",mc:5000000000},
{s:"UNI",n:"Uniswap",i:"🦄",p:12,bal:100,cg:"uniswap",mc:7000000000},
{s:"LINK",n:"Chainlink",i:"🔗",p:18,bal:50,cg:"chainlink",mc:10000000000},
{s:"PEPE",n:"Pepe",i:"🐸",p:0.000012,bal:50000000,cg:"pepe",mc:5000000000},
{s:"SHIB",n:"Shiba Inu",i:"🐕",p:0.000025,bal:10000000,cg:"shiba-inu",mc:15000000000},
{s:"FLOKI",n:"Floki",i:"⚡",p:0.00018,bal:500000,cg:"floki",mc:1500000000},
{s:"DOGE",n:"Dogecoin",i:"🐶",p:0.15,bal:2000,cg:"dogecoin",mc:20000000000},
{s:"WIF",n:"dogwifhat",i:"🎩",p:2.50,bal:300,cg:"dogwifhat",mc:2500000000},
{s:"BONK",n:"Bonk",i:"🦴",p:0.000022,bal:10000000,cg:"bonk",mc:1500000000},
{s:"MOG",n:"Mog Coin",i:"😎",p:0.0000021,bal:50000000,cg:"mog-coin",mc:800000000}
];

var DEXES=[
{name:"Uniswap V3",color:"#ff007a",fee:0.3,icon:"🦄",vol:2500000000},
{name:"SushiSwap",color:"#fa52a1",fee:0.3,icon:"🍣",vol:800000000},
{name:"1inch",color:"#1c8cdc",fee:0,icon:"1️⃣",vol:1200000000},
{name:"Curve",color:"#0066ff",fee:0.04,icon:"📐",vol:500000000},
{name:"Balancer",color:"#555",fee:0.2,icon:"⚖️",vol:300000000},
{name:"ParaSwap",color:"#5929e6",fee:0,icon:"🔄",vol:400000000},
{name:"0x Protocol",color:"#333",fee:0,icon:"0️⃣",vol:600000000},
{name:"PancakeSwap",color:"#d1884f",fee:0.25,icon:"🥞",vol:1800000000}
];

var pages=["swap","limit","routes","gas","portfolio","history","alerts","charts","dex","tokens","news","fear","settings"];
var icons={swap:"⚡",limit:"📋",routes:"📊",gas:"⛽",portfolio:"💼",history:"📜",alerts:"🔔",charts:"📈",dex:"🏦",tokens:"🪙",news:"📰",fear:"😱",settings:"⚙️"};
var labels={swap:"Swap",limit:"Limit",routes:"Routes",gas:"Gas",portfolio:"Portfolio",history:"History",alerts:"Alerts",charts:"Charts",dex:"DEXes",tokens:"Tokens",news:"News",fear:"Fear",settings:"Settings"};

var sI=T[0],sO=T[7],co=false,pg="swap",md2="in";
var hist=[],alerts=[],limOrds=[];
var apiStatus={coingecko:"loading",etherscan:"loading",cryptocompare:"loading",feargreed:"loading"};
var fearData={value:50,classification:"Neutral"};
var newsData=[];
var gasData={slow:15,standard:25,fast:45};

// Build nav
var navHtml="";pages.forEach(function(p,i){navHtml+='<a'+(i===0?' class="on"':'')+' onclick="go(\''+p+'\',this)">'+icons[p]+' '+labels[p]+'</a>';});
document.getElementById("nav").innerHTML=navHtml;

// ============ API FUNCTIONS ============

// CoinGecko - Prices, Market Cap, Volume
function fetchPrices(){
var ids=T.map(function(t){return t.cg}).join(",");
fetch("https://api.coingecko.com/api/v3/simple/price?ids="+ids+"&vs_currencies=usd&include_market_cap=true&include_24hr_vol=true&include_24hr_change=true")
.then(function(r){return r.json()})
.then(function(data){
var totalVol=0;var totalMC=0;
T.forEach(function(t){
if(data[t.cg]){
t.p=data[t.cg].usd||t.p;
t.mc=data[t.cg].usd_market_cap||t.mc;
t.vol24=data[t.cg].usd_24h_vol||0;
t.change24=data[t.cg].usd_24h_change||0;
totalVol+=t.vol24;totalMC+=t.mc;
}
});
apiStatus.coingecko="ok";
document.getElementById("volStat").textContent="$"+fmtBig(totalVol);
document.getElementById("mcapStat").textContent="$"+fmtBig(totalMC);
buildTicker();
})
.catch(function(){apiStatus.coingecko="error";buildTicker();});
}

// Etherscan - Gas prices
function fetchGas(){
fetch("https://api.etherscan.io/api?module=gastracker&action=gasoracle")
.then(function(r){return r.json()})
.then(function(data){
if(data.result){
gasData.slow=parseInt(data.result.SafeGasPrice)||15;
gasData.standard=parseInt(data.result.ProposeGasPrice)||25;
gasData.fast=parseInt(data.result.FastGasPrice)||45;
apiStatus.etherscan="ok";
if(pg==="gas")rn();
}
})
.catch(function(){apiStatus.etherscan="error";});
}

// CryptoCompare - News
function fetchNews(){
fetch("https://min-api.cryptocompare.com/data/v2/news/?lang=EN&limit=10")
.then(function(r){return r.json()})
.then(function(data){
if(data.Data){
newsData=data.Data.slice(0,10).map(function(n){
return {title:n.title,url:n.url,source:n.source,published:new Date(n.published_on*1000).toLocaleDateString()};
});
apiStatus.cryptocompare="ok";
if(pg==="news")rn();
}
})
.catch(function(){apiStatus.cryptocompare="error";});
}

// Fear & Greed Index
function fetchFearGreed(){
fetch("https://api.alternative.me/fng/?limit=1")
.then(function(r){return r.json()})
.then(function(data){
if(data.data&&data.data[0]){
fearData={value:parseInt(data.data[0].value),classification:data.data[0].value_classification};
apiStatus.feargreed="ok";
if(pg==="fear")rn();
}
})
.catch(function(){apiStatus.feargreed="error";});
}

// Fetch all
function fetchAll(){
fetchPrices();fetchGas();fetchNews();fetchFearGreed();
}

// ============ TICKER ============
function buildTicker(){
var el=document.getElementById("tk");if(!el)return;
var h="";
for(var i=0;i<2;i++){T.forEach(function(t){
var ch=t.change24||(Math.random()*10-5);
var cls=ch>=0?"g":"r";
h+='<div class="ti"><b>'+t.i+' '+t.s+'</b> $'+t.p.toLocaleString(undefined,{minimumFractionDigits:t.p<1?6:2,maximumFractionDigits:t.p<1?6:2})+' <span class="'+cls+'">'+(ch>=0?"+":"")+ch.toFixed(2)+'%</span></div>';
});}
el.innerHTML=h;
}

// ============ NAVIGATION ============
function go(p,b){pg=p;document.querySelectorAll(".hdr nav a").forEach(function(x){x.classList.remove("on")});if(b)b.classList.add("on");rn();}

// ============ RENDER ============
function rn(){
var a=document.getElementById("area");

if(pg==="swap"){
var routes=genRoutes();var best=routes[0];
a.innerHTML='<div class="swap-wrap"><div class="card" style="max-width:420px;width:100%"><h2>⚡ Best Rate Swap</h2><div class="fld"><label><span>YOU PAY</span><span>Balance: '+fmtBal(sI)+'</span></label><div class="frow"><input id="ai" placeholder="0.0" oninput="cl()"><button class="tsel" onclick="om(\'in\')">'+sI.i+' '+sI.s+' ▼</button></div></div><div class="arr"><button onclick="sw()">↕</button></div><div class="fld"><label><span>YOU RECEIVE</span><span>Balance: '+fmtBal(sO)+'</span></label><div class="frow"><input id="ao" placeholder="0.0" readonly><button class="tsel" onclick="om(\'out\')">'+sO.i+' '+sO.s+' ▼</button></div></div><div class="qi" id="qi"><div class="qr"><span class="ql">Best Route</span><span class="qv" id="qr">-</span></div><div class="qr"><span class="ql">Savings vs Avg</span><span class="qv g" id="qp">-</span></div><div class="qr"><span class="ql">Gas Fee</span><span class="qv" id="qf">-</span></div></div><button class="sbtn'+(co?"":" off")+'" onclick="ds()">'+(co?"Swap via "+best.name:"Connect Wallet to Swap")+'</button></div><div class="card" style="max-width:420px;width:100%"><h2>📊 Compare Routes</h2>'+renderRoutes(routes)+'</div></div>';

} else if(pg==="limit"){
a.innerHTML='<div class="card" style="max-width:420px;margin:0 auto"><h2>📋 Limit Orders</h2><div class="lc"><label>From</label><button class="tsel" onclick="om(\'in\')" style="width:100%;text-align:left">'+sI.i+' '+sI.s+'</button></div><div class="lc"><label>To</label><button class="tsel" onclick="om(\'out\')" style="width:100%;text-align:left">'+sO.i+' '+sO.s+'</button></div><div class="lc"><label>Amount</label><input type="number" id="limAmt" placeholder="0.0"></div><div class="lc"><label>Target Price ($)</label><input type="number" id="limPrice" placeholder="0.00"></div><div class="lc"><label>Expiry</label><select><option>24h</option><option>7d</option><option>30d</option></select></div><button class="sbtn" onclick="placeLim()">Place Order</button><div style="margin-top:16px"><h3 style="font-size:14px;margin-bottom:10px">Active Orders</h3>'+renderLimOrds()+'</div></div>';

} else if(pg==="routes"){
a.innerHTML='<div class="card" style="max-width:600px;margin:0 auto"><h2>📊 All Routes</h2>'+renderRoutes(genRoutes())+'</div>';

} else if(pg==="gas"){
var g1=gasData.slow;var g2=gasData.standard;var g3=gasData.fast;
var ethPrice=T[0].p;
a.innerHTML='<div class="card" style="max-width:600px;margin:0 auto"><h2>⛽ Gas Tracker (Etherscan API)</h2><div class="api-status"><span class="api-badge '+(apiStatus.etherscan==="ok"?"api-ok":"api-err")+'">Etherscan: '+apiStatus.etherscan+'</span></div><div class="gg"><div class="gi"><div class="gs">🐢 Slow</div><div class="gp g">'+g1+'</div><div class="gc">Gwei</div><div class="gc">~$'+(g1*0.000021*ethPrice).toFixed(2)+'</div><div class="gas-bar"><div class="gas-fill" style="width:'+Math.min(g1*2,100)+'%;background:#10b981"></div></div></div><div class="gi" style="border:1px solid #00d4ff"><div class="gs">🚶 Standard</div><div class="gp" style="color:#00d4ff">'+g2+'</div><div class="gc">Gwei</div><div class="gc">~$'+(g2*0.000021*ethPrice).toFixed(2)+'</div><div class="gas-bar"><div class="gas-fill" style="width:'+Math.min(g2*2,100)+'%;background:#00d4ff"></div></div></div><div class="gi"><div class="gs">🚀 Fast</div><div class="gp r">'+g3+'</div><div class="gc">Gwei</div><div class="gc">~$'+(g3*0.000021*ethPrice).toFixed(2)+'</div><div class="gas-bar"><div class="gas-fill" style="width:'+Math.min(g3*2,100)+'%;background:#ef4444"></div></div></div></div><div style="margin-top:12px;padding:12px;background:#1a1a3e;border-radius:8px;font-size:12px;color:#888">💡 Swap uses ~150k-200k gas units. Prices from Etherscan API.</div></div>';

} else if(pg==="portfolio"){
var total=0;T.forEach(function(t){total+=t.bal*t.p});
var h='<div class="card" style="max-width:600px;margin:0 auto"><h2>💼 Portfolio</h2><div style="text-align:center;margin-bottom:20px"><div style="font-size:12px;color:#888">Total Value</div><div style="font-size:36px;font-weight:800;color:#00d4ff">$'+total.toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>';
T.forEach(function(t){if(t.bal>0){var val=t.bal*t.p;var ch=t.change24||0;h+='<div class="pi"><div style="font-size:24px;width:40px;text-align:center">'+t.i+'</div><div style="flex:1"><b>'+t.s+'</b><br><small style="color:#666">'+t.n+'</small></div><div style="text-align:right"><b>'+t.bal.toLocaleString(undefined,{maximumFractionDigits:4})+' '+t.s+'</b><br><small style="color:#888">$'+val.toLocaleString(undefined,{minimumFractionDigits:2})+' <span class="'+(ch>=0?"g":"r")+'">'+(ch>=0?"+":"")+ch.toFixed(2)+'%</span></small></div></div>';}});
h+='</div>';a.innerHTML=h;

} else if(pg==="history"){
var h='<div class="card" style="max-width:600px;margin:0 auto"><h2>📜 History</h2>';
if(hist.length===0)h+='<p style="color:#888;text-align:center;padding:20px">No transactions yet</p>';
